<!doctype html>
<html lang="en-US">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thank You · Shelter Island Hidden Estate</title>
  <meta name="robots" content="noindex" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .thanks {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 28px;
      background: var(--cream);
    }
    .thanks-card { max-width: 620px; }
    .thanks-card .section-title { margin-bottom: 18px; }
    .thanks-card .lead { margin-bottom: 36px; }
    .thanks-mark {
      font-family: var(--serif);
      font-size: 1.6rem;
      color: var(--sage-dark);
      margin-bottom: 28px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <main class="thanks">
    <div class="thanks-card">
      <div class="thanks-mark">Shelter Island Hidden Estate</div>
      <p class="eyebrow">Inquiry received</p>
      <h1 class="section-title">Thank you</h1>
      <p class="lead">Your inquiry has been sent — we'll be in touch by email, usually within a day. We look forward to welcoming you to the estate.</p>
      <a href="index.html" class="btn btn-solid">Back to the Estate</a>
    </div>
  </main>
</body>
</html>
